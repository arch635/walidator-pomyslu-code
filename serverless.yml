service: walidator-pomyslu

frameworkVersion: "^4.0.0"

provider:
  name: aws
  runtime: nodejs22.x
  region: eu-central-1
  stage: ${opt:stage, 'prod'}
  architecture: arm64
  memorySize: 512
  timeout: 30
  logRetentionInDays: 14
  environment:
    STAGE: ${self:provider.stage}
    BEDROCK_MODEL_ID: eu.anthropic.claude-haiku-4-5-20251001-v1:0
    BEDROCK_REGION: eu-central-1
    MAX_OUTPUT_TOKENS: "2500"
    PROMPT_PATH: prompts/walidator-v2.md
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "*"
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
          Resource:
            - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-*"
            - "arn:aws:bedrock:*:502761806947:inference-profile/eu.anthropic.claude-haiku-4-5-*"

package:
  individually: true
  patterns:
    - "!**/*"
    - "src/handler.js"
    - "src/prompts/walidator-v2.md"

functions:
  walidator:
    handler: src/handler.handler
    description: Walidator pomyslu - Claude Haiku 4.5 (Bedrock) z promptem v2.0, tryb one-shot (krok 6).
    events:
      - httpApi:
          path: /walidator
          method: post
      - httpApi:
          path: /walidator
          method: options

custom:
  # CORS dopuszczamy tylko produkcyjną subdomenę + tymczasowy CloudFront URL (dla testów
  # przed ustawieniem DNS). Dodatkowy rekord aktualizujemy po utworzeniu CloudFront.
  corsOrigins:
    - https://walidator.racicki.com

resources:
  Outputs:
    HttpApiEndpoint:
      Description: Base URL API Gateway (httpApi)
      Value:
        Fn::Join:
          - ""
          - - "https://"
            - Ref: HttpApi
            - ".execute-api."
            - ${self:provider.region}
            - ".amazonaws.com"
