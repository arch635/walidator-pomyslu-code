service: walidator-pomyslu

frameworkVersion: "^4.0.0"

provider:
  name: aws
  runtime: nodejs22.x
  region: eu-central-1
  stage: ${opt:stage, 'prod'}
  architecture: arm64
  memorySize: 512
  timeout: 30
  logRetentionInDays: 14
  environment:
    STAGE: ${self:provider.stage}
    BEDROCK_MODEL_ID: eu.anthropic.claude-haiku-4-5-20251001-v1:0
    BEDROCK_REGION: eu-central-1
    MAX_OUTPUT_TOKENS: "2500"
    MAX_OUTPUT_TOKENS_REPORT: "1900"
    MAX_OUTPUT_TOKENS_REPORT_MINI: "900"
    PROMPT_PATH: prompts/walidator-v2.md
    PROMPT_PATH_MINI: prompts/walidator-mini.md
    SESSIONS_TABLE: walidator-sessions-${self:provider.stage}
    MAX_TURNS: "25"
    MAX_TURNS_MINI: "5"
    PROMPT_CACHE_ENABLED: "true"
    ENABLE_AUTO_SHUTDOWN: "false"
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "*"
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
          Resource:
            - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-*"
            - "arn:aws:bedrock:*:502761806947:inference-profile/eu.anthropic.claude-haiku-4-5-*"
            - "arn:aws:bedrock:*::foundation-model/anthropic.claude-sonnet-4-6-*"
            - "arn:aws:bedrock:*:502761806947:inference-profile/eu.anthropic.claude-sonnet-4-6-*"
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - Fn::GetAtt: [SessionsTable, Arn]
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: "*"

package:
  individually: true
  patterns:
    - "!**/*"

functions:
  walidator:
    handler: src/handler.handler
    description: Walidator pomyslu - Claude Haiku 4.5 (Bedrock). /walidator (one-shot) + /walidator/turn (5 pytan mini lub 25 pytan full, sesja w DynamoDB).
    package:
      patterns:
        - "src/handler.js"
        - "src/prompts/walidator-v2.md"
        - "src/prompts/walidator-mini.md"
    events:
      - httpApi:
          path: /walidator
          method: post
      - httpApi:
          path: /walidator
          method: options
      - httpApi:
          path: /walidator/turn
          method: post
      - httpApi:
          path: /walidator/turn
          method: options
      - httpApi:
          path: /walidator/feedback
          method: post
      - httpApi:
          path: /walidator/feedback
          method: options
      - httpApi:
          path: /walidator/session/{id}
          method: get
      - httpApi:
          path: /walidator/session/{id}
          method: options

  walidatorDailyReport:
    handler: src/daily_report.handler
    description: Codzienny raport mailowy (SES) z aktywnosci walidatora w ostatnich 24h. Wywolywany przez EventBridge Scheduler 8:00 Europe/Warsaw.
    memorySize: 256
    timeout: 30
    environment:
      REPORT_TO: artur@racicki.com
      REPORT_FROM: artur@racicki.com
      LOOKBACK_HOURS: "24"
      COST_PER_FINAL_SESSION: "0.083"
      COST_PER_DIALOG_TURN: "0.0033"
      COST_PER_FINAL_SESSION_MINI: "0.013"
      COST_PER_DIALOG_TURN_MINI: "0.0007"
      COST_INFRA_DAILY: "0.0017"
    package:
      patterns:
        - "src/daily_report.js"

custom:
  corsOrigins:
    - https://walidator.racicki.com

resources:
  Resources:
    SessionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: walidator-sessions-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: session_id
            AttributeType: S
        KeySchema:
          - AttributeName: session_id
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: false
        Tags:
          - Key: project
            Value: walidator-pomyslu
          - Key: stage
            Value: ${self:provider.stage}

    DailyReportSchedulerRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: walidator-daily-report-scheduler-${self:provider.stage}
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: scheduler.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: InvokeDailyReportLambda
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action: lambda:InvokeFunction
                  Resource:
                    - Fn::GetAtt: [WalidatorDailyReportLambdaFunction, Arn]

    DailyReportSchedule:
      Type: AWS::Scheduler::Schedule
      Properties:
        Name: walidator-daily-report-${self:provider.stage}
        Description: Codzienny raport mailowy walidatora (8:00 Europe/Warsaw)
        ScheduleExpression: "cron(0 8 * * ? *)"
        ScheduleExpressionTimezone: Europe/Warsaw
        State: ENABLED
        FlexibleTimeWindow:
          Mode: "OFF"
        Target:
          Arn:
            Fn::GetAtt: [WalidatorDailyReportLambdaFunction, Arn]
          RoleArn:
            Fn::GetAtt: [DailyReportSchedulerRole, Arn]
          RetryPolicy:
            MaximumRetryAttempts: 2
            MaximumEventAgeInSeconds: 3600

    AlertsTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: alerts-walidator-${self:provider.stage}
        DisplayName: Walidator Alerts

    AlertsEmailSubscription:
      Type: AWS::SNS::Subscription
      Properties:
        Protocol: email
        Endpoint: artur@racicki.com
        TopicArn:
          Ref: AlertsTopic

    WalidatorLambdaErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: walidator-${self:provider.stage}-lambda-errors
        AlarmDescription: Walidator Lambda Errors > 5 w 1h
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value:
              Ref: WalidatorLambdaFunction
        Statistic: Sum
        Period: 3600
        EvaluationPeriods: 1
        Threshold: 5
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - Ref: AlertsTopic
        OKActions:
          - Ref: AlertsTopic

    DailyReportLambdaErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: walidator-${self:provider.stage}-daily-report-errors
        AlarmDescription: Daily report Lambda Errors >= 1 w 1h (krytyczna, rzadka)
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value:
              Ref: WalidatorDailyReportLambdaFunction
        Statistic: Sum
        Period: 3600
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - Ref: AlertsTopic
        OKActions:
          - Ref: AlertsTopic

    WalidatorLambdaDurationAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: walidator-${self:provider.stage}-lambda-duration-p99
        AlarmDescription: Walidator Lambda p99 duration > 28s (blisko timeout 30s)
        Namespace: AWS/Lambda
        MetricName: Duration
        Dimensions:
          - Name: FunctionName
            Value:
              Ref: WalidatorLambdaFunction
        ExtendedStatistic: p99
        Period: 300
        EvaluationPeriods: 2
        Threshold: 28000
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - Ref: AlertsTopic
        OKActions:
          - Ref: AlertsTopic

    SessionsTableThrottlesAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: walidator-${self:provider.stage}-ddb-throttles
        AlarmDescription: DynamoDB SessionsTable throttles > 0
        Namespace: AWS/DynamoDB
        MetricName: ThrottledRequests
        Dimensions:
          - Name: TableName
            Value:
              Ref: SessionsTable
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 0
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - Ref: AlertsTopic
        OKActions:
          - Ref: AlertsTopic

    DailyReportMissedAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: walidator-${self:provider.stage}-daily-report-missed
        AlarmDescription: Daily report Lambda nie wywołana w oknie 24h (Scheduler padł)
        Namespace: AWS/Lambda
        MetricName: Invocations
        Dimensions:
          - Name: FunctionName
            Value:
              Ref: WalidatorDailyReportLambdaFunction
        Statistic: Sum
        Period: 86400
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: LessThanThreshold
        TreatMissingData: breaching
        AlarmActions:
          - Ref: AlertsTopic
        OKActions:
          - Ref: AlertsTopic

  Outputs:
    HttpApiEndpoint:
      Description: Base URL API Gateway (httpApi)
      Value:
        Fn::Join:
          - ""
          - - "https://"
            - Ref: HttpApi
            - ".execute-api."
            - ${self:provider.region}
            - ".amazonaws.com"
    SessionsTableName:
      Description: DynamoDB sessions table
      Value: !Ref SessionsTable
    DailyReportScheduleName:
      Description: EventBridge Scheduler schedule name
      Value: !Ref DailyReportSchedule
    DailyReportLambdaName:
      Description: Daily report Lambda function name
      Value: !Ref WalidatorDailyReportLambdaFunction
    AlertsTopicArn:
      Description: SNS topic dla alarmów CloudWatch
      Value: !Ref AlertsTopic
